# Drift check between Vault (source of truth) and AWS SSM SecureString
# (runtime cache). Catches the case where the vault-to-ssm-sync timer dies
# silently and SSM diverges.
#
# Runs as a separate workflow (not in ci.yml) so a Vault-side outage
# doesn't red the PR CI gate. Fail-on-divergence; the workflow runs
# only against main.
#
# DISPATCH-ONLY — this workflow was never wired up, independent of M5.
# Note: the Vault JWT auth method itself is ALREADY LIVE (M5 shipped in #279,
# 2026-05-31 — see docs/plans/SECRETS-MIGRATION.md). `linear-sync.yml` uses it
# today. This workflow simply was not migrated to it: the Vault step below is
# still a commented placeholder, so the comparison body stays gated off
# (`env.VAULT_TOKEN` is never set). Two things must land before the daily
# `schedule` can be restored:
#   1. Rewire the Vault step to `hashicorp/vault-action` (copy linear-sync.yml:
#      method jwt + CF-Access service-token headers) and provision its Vault
#      role/policy (read on the platform/data/{staging,production}/* keys).
#   2. Stop assuming the env-scoped production deploy role: a scheduled main
#      run has no `environment:` claim, so the trust policy
#      (docs/specs/OIDC-TRUST.md) rejects its OIDC `sub` at the AWS step. Give
#      it a least-privilege SSM-read role whose trust allows the scheduled-main
#      subject.
# Until BOTH exist this stays dispatch-only. Tracked in Linear DEV-46.
#
# Tracks: AFF-245 M4 advisor Gate 0 should-fix #7.

name: secrets-drift

on:
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: secrets-drift
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # OIDC → AWS
      contents: read
    env:
      AWS_REGION: eu-central-1
      VAULT_ADDR: https://secrets-admin.afframe.com
      VAULT_KEYS: |
        staging/better-auth-secret
        staging/resend-api-key
        production/better-auth-secret
        production/resend-api-key
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Vault CLI
        env:
          VAULT_VERSION: "1.20.4"
        run: |
          set -euo pipefail
          curl -fsSL "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_linux_amd64.zip" \
            -o /tmp/vault.zip
          sudo unzip -q /tmp/vault.zip -d /usr/local/bin
          vault version

      - name: Vault auth (GitHub OIDC → Vault JWT)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Exchange the GitHub OIDC token for a Vault token via the JWT
          # auth method. That method is LIVE (M5, #279) — `linear-sync.yml`
          # uses it via `hashicorp/vault-action` (method jwt + CF-Access
          # headers). This step was never migrated to it, so it stays a no-op
          # placeholder. To wire it up, replace the block below with the
          # vault-action pattern from linear-sync.yml and provision the
          # `gha-drift` Vault role/policy. Tracked: DEV-46.
          : "${VAULT_AUDIENCE:=vault}"
          # JWT=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          #   "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$VAULT_AUDIENCE" | jq -r .value)
          # VAULT_TOKEN=$(vault write -field=token auth/jwt/login role=gha-drift jwt="$JWT")
          # echo "VAULT_TOKEN=$VAULT_TOKEN" >> "$GITHUB_ENV"
          echo "[skipped — Vault step not yet wired to the live M5 JWT auth; dispatch-only. See DEV-46]"

      - name: Compare Vault vs SSM (each tracked key)
        if: env.VAULT_TOKEN != ''
        run: |
          set -euo pipefail
          DIVERGED=0
          while IFS= read -r line; do
            key=$(echo "$line" | xargs)
            [[ -z "$key" ]] && continue

            # `vault kv get` is the KV-v2-aware CLI: it auto-translates
            # `platform/${key}` → API path `platform/data/${key}`. Passing
            # the `data/` segment explicitly would double it.
            vault_val=$(vault kv get -field=value "platform/${key}" 2>/dev/null || echo "__VAULT_MISSING__")
            ssm_val=$(aws ssm get-parameter \
              --name "/monorepo/${key}" --with-decryption \
              --query 'Parameter.Value' --output text 2>/dev/null || echo "__SSM_MISSING__")

            if [[ "$vault_val" == "$ssm_val" ]]; then
              echo "::notice::${key}: in sync"
            else
              echo "::error::${key}: DRIFT detected (Vault != SSM)"
              DIVERGED=1
            fi
          done <<< "$VAULT_KEYS"

          # Heartbeat freshness: each env should have a recent sync-heartbeat.
          for env in staging production; do
            hb=$(aws ssm get-parameter \
              --name "/monorepo/${env}/sync-heartbeat" --with-decryption \
              --query 'Parameter.Value' --output text 2>/dev/null || echo "0")
            age=$(( $(date -u +%s) - hb ))
            if (( age > 900 )); then
              echo "::error::${env}/sync-heartbeat is ${age}s stale (> 15 min)"
              DIVERGED=1
            else
              echo "::notice::${env}/sync-heartbeat: ${age}s fresh"
            fi
          done

          if [[ "$DIVERGED" == "1" ]]; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
